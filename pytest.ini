[pytest]
# Pytest configuration for nvimagecodec

# Register custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests that may require external resources
    
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 6.0

# Console output format
console_output_style = progress

# Show extra test summary info
# Skip slow tests by default (override with: pytest -m "slow" or pytest -m "")
addopts = -ra --strict-markers -m "not slow"

